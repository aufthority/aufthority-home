<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>NafasLega — Breathing Exercise · Aufthority</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="f79c60f1-f9e7-4170-a979-f357ba756a18"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --ink: #1a1a18;
    --muted: #6b6b62;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --rule: #e0ddd5;
    --card-bg: #ffffff;
    --radius: 2px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --ink: #f0ede6;
      --muted: #9a9a8e;
      --accent: #52b788;
      --accent-light: #1a2e24;
      --rule: #2a2a26;
      --card-bg: #1e1e1a;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
  }

  /* ════════════════════════════════
     SPLASH
  ════════════════════════════════ */
  #splash {
    background: var(--bg);
    align-items: center;
    justify-content: space-between;
    padding: 44px 28px 36px;
  }
  .splash-top {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .breadcrumb {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.1s;
  }
  .breadcrumb a {
    font-family: 'DM Serif Display', serif;
    font-size: 0.9rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb-sep { font-size: 0.75rem; color: var(--rule); }
  .breadcrumb strong {
    font-family: 'DM Serif Display', serif;
    font-size: 0.9rem;
    color: var(--ink);
    font-weight: 400;
  }

  /* ── Mode selector ── */
  .mode-selector {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.18s;
  }
  .mode-btn {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 12px 10px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .mode-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .mode-btn-label {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    margin-bottom: 3px;
    color: var(--ink);
  }
  .mode-btn-sub {
    font-size: 0.6rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .splash-orb-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .splash-ring-outer {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(45,106,79,0.1);
    animation: ringPulse 4s ease-in-out infinite 0.3s;
  }
  .splash-ring-inner {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(45,106,79,0.18);
    animation: ringPulse 4s ease-in-out infinite;
  }
  .splash-orb {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 8px 36px rgba(45,106,79,0.22);
    animation: orbPulse 4s ease-in-out infinite;
    position: relative;
    z-index: 2;
  }
  @keyframes orbPulse {
    0%,100% { transform: scale(1);     box-shadow: 0 8px 36px rgba(45,106,79,0.22); }
    50%      { transform: scale(1.18); box-shadow: 0 12px 52px rgba(45,106,79,0.3); }
  }
  @keyframes ringPulse {
    0%,100% { transform: scale(1);    opacity: 0.6; }
    50%      { transform: scale(1.2); opacity: 0.15; }
  }

  /* Box splash preview */
  .splash-box-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    display: none;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .splash-box-wrap.visible { display: flex; }

  .splash-text {
    text-align: center;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.32s;
  }
  .splash-eyebrow {
    font-size: 0.64rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .splash-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.6rem;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .splash-title em { font-style: italic; color: var(--accent); }
  .splash-tagline {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .splash-desc {
    font-size: 0.86rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 280px;
    margin: 0 auto;
  }
  .phase-pills {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.46s;
  }
  .pill {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 66px;
  }
  .pill-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    line-height: 1;
  }
  .pill-label {
    font-size: 0.56rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .pill-dot { font-size: 0.75rem; color: var(--rule); }
  .splash-bottom {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }
  .btn-begin {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-begin:hover  { background: var(--accent); transform: translateY(-1px); }
  .btn-begin:active { transform: translateY(0); }
  .splash-footnote {
    font-size: 0.68rem;
    color: var(--rule);
    letter-spacing: 0.05em;
  }

  /* ════════════════════════════════
     TOOL
  ════════════════════════════════ */
  #tool { background: var(--bg); justify-content: space-between; }

  .tool-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }
  .tool-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
  }
  .tool-brand em { font-style: italic; color: var(--accent); }
  .topbar-controls { display: flex; align-items: center; gap: 8px; }
  .btn-mute {
    background: none;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 0.9rem;
    line-height: 1;
    cursor: pointer;
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-mute:hover { border-color: var(--ink); color: var(--ink); }
  .btn-mute.muted { opacity: 0.4; }
  .btn-exit {
    background: none;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.66rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-exit:hover { border-color: var(--ink); color: var(--ink); }

  .orb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Orb visualiser (478) ── */
  .orb-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .orb-ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 160px; height: 160px;
    transform: rotate(-90deg);
    overflow: visible;
  }
  .orb-ball {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 6px 28px rgba(45,106,79,0.18);
    position: relative;
    z-index: 2;
    transform: scale(1);
    will-change: transform;
  }

  /* ── Box visualiser ── */
  .box-wrap {
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .box-wrap.visible { display: flex; }
  #boxSvg { overflow: visible; }

  .tool-bottom {
    flex-shrink: 0;
    border-top: 1px solid var(--rule);
    padding: 20px 24px 28px;
    display: flex;
    flex-direction: column;
  }
  .phase-timer-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .phase-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-style: italic;
    color: var(--accent);
    line-height: 1;
  }
  .timer-block { display: flex; align-items: baseline; gap: 3px; }
  .timer-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    line-height: 1;
  }
  .timer-unit {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .phase-instr {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 14px;
  }
  .stat { text-align: center; flex: 1; }
  .stat-val {
    display: block;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
  }
  .stat-label {
    font-size: 0.58rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .phase-guide { display: flex; margin-bottom: 14px; }
  .guide-item {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    border-right: 1px solid var(--rule);
  }
  .guide-item:last-child { border-right: none; }
  .guide-phase-lbl {
    font-size: 0.56rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--rule);
    margin-bottom: 3px;
    transition: color 0.3s;
  }
  .guide-dur-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    transition: color 0.3s;
  }
  .guide-dur-val small {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    font-weight: 300;
    color: var(--muted);
    margin-left: 1px;
  }
  .guide-item.active .guide-phase-lbl { color: var(--accent); }
  .guide-item.active .guide-dur-val   { color: var(--accent); }
  .btn-stop {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.74rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-stop:hover { border-color: var(--ink); color: var(--ink); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-height: 680px) {
    #splash { padding: 32px 28px 28px; }
    .breadcrumb { margin-bottom: 16px; }
    .splash-orb-wrap { width: 110px; height: 110px; margin-bottom: 16px; }
    .splash-orb { width: 52px; height: 52px; }
    .splash-title { font-size: 2.2rem; }
    .splash-desc { font-size: 0.82rem; }
    .splash-text { margin-bottom: 14px; }
    .tool-bottom { padding: 14px 24px 20px; }
    .mode-selector { margin-bottom: 16px; }
  }
  @media (max-width: 360px) {
    .pill { min-width: 56px; padding: 8px 10px; }
    .splash-title { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="screen" id="splash">
  <div class="splash-top">
    <div class="breadcrumb">
      <a href="https://www.aufthority.com">Aufthority</a>
      <span class="breadcrumb-sep">/</span>
      <strong>NafasLega</strong>
    </div>

    <!-- Mode selector -->
    <div class="mode-selector">
      <button class="mode-btn active" id="mode478" onclick="selectMode('478')"
        data-umami-event="NafasLega - Mode 478">
        <div class="mode-btn-label">4 · 7 · 8</div>
        <div class="mode-btn-sub">Deep calm</div>
      </button>
      <button class="mode-btn" id="modeBox" onclick="selectMode('box')"
        data-umami-event="NafasLega - Mode Box">
        <div class="mode-btn-label">Box</div>
        <div class="mode-btn-sub">Focus &amp; balance</div>
      </button>
    </div>

    <!-- 478 preview -->
    <div class="splash-orb-wrap" id="splashOrbWrap">
      <div class="splash-ring-outer"></div>
      <div class="splash-ring-inner"></div>
      <div class="splash-orb"></div>
    </div>

    <!-- Box preview -->
    <div class="splash-box-wrap" id="splashBoxWrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <rect x="10" y="10" width="80" height="80"
          fill="none" stroke-width="1.5"
          stroke="var(--rule)" shape-rendering="crispEdges"/>
        <rect id="splashBoxTrail" x="10" y="10" width="80" height="80"
          fill="none" stroke-width="1.5"
          stroke="var(--accent)" shape-rendering="crispEdges"
          stroke-dasharray="320" stroke-dashoffset="320"
          style="opacity:0.45"/>
        <circle id="splashDot" cx="10" cy="10" r="5" fill="var(--accent)"/>
      </svg>
    </div>

    <div class="splash-text">
      <p class="splash-eyebrow">Evidence-Based Breathwork</p>
      <h1 class="splash-title">Nafas<em>Lega</em></h1>
      <p class="splash-tagline" id="splashTagline">4 · 7 · 8 Breathing Technique</p>
      <p class="splash-desc" id="splashDesc">
        Activates your parasympathetic nervous system —
        calming your heart rate and cortisol in minutes.
      </p>
    </div>

    <div class="phase-pills" id="phasePills">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="splash-bottom">
    <button class="btn-begin" id="btnBegin"
      data-umami-event="NafasLega - Begin">Begin →</button>
    <p class="splash-footnote">Free · No account needed</p>
  </div>
</div>

<!-- TOOL -->
<div class="screen hidden" id="tool">
  <div class="tool-topbar">
    <div class="tool-brand">Nafas<em>Lega</em></div>
    <div class="topbar-controls">
      <button class="btn-mute" id="btnMute" title="Toggle sound">🔊</button>
      <button class="btn-exit" id="btnExit"
        data-umami-event="NafasLega - Exit">← Exit</button>
    </div>
  </div>

  <div class="orb-stage">
    <!-- 478 orb -->
    <div class="orb-wrap" id="orbWrap">
      <svg class="orb-ring-svg" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="72"
          fill="none" stroke="var(--rule)" stroke-width="1"/>
        <circle id="arcPath" cx="80" cy="80" r="72"
          fill="none" stroke="var(--accent)" stroke-width="1.5"
          stroke-linecap="round"
          stroke-dasharray="452.39" stroke-dashoffset="452.39"/>
      </svg>
      <div class="orb-ball" id="orbBall"></div>
    </div>

    <!-- Box SVG -->
    <div class="box-wrap" id="boxWrap">
      <!--
        Square: 160×160 canvas, 20px margin → 120×120 inner square.
        Perimeter = 4 × 120 = 480px.
        Corners: TL(20,20) TR(140,20) BR(140,140) BL(20,140)
        Path starts at TL, goes clockwise: top → right → bottom → left.
      -->
      <svg id="boxSvg" width="160" height="160" viewBox="0 0 160 160">
        <!-- Dim track -->
        <polyline id="boxTrackTL"
          points="20,20 140,20 140,140 20,140 20,20"
          fill="none" stroke="var(--rule)" stroke-width="1.5"
          stroke-linejoin="miter" shape-rendering="crispEdges"/>
        <!-- Bright trail (drawn via JS canvas-style on a single path element) -->
        <!-- We use four separate line segments, toggled active by JS -->
        <!-- Top side -->
        <line id="bSide0" x1="20" y1="20" x2="20" y2="20"
          stroke="var(--accent)" stroke-width="2"
          stroke-linecap="square" shape-rendering="crispEdges" opacity="0.55"/>
        <!-- Right side -->
        <line id="bSide1" x1="140" y1="20" x2="140" y2="20"
          stroke="var(--accent)" stroke-width="2"
          stroke-linecap="square" shape-rendering="crispEdges" opacity="0.55"/>
        <!-- Bottom side -->
        <line id="bSide2" x1="140" y1="140" x2="140" y2="140"
          stroke="var(--accent)" stroke-width="2"
          stroke-linecap="square" shape-rendering="crispEdges" opacity="0.55"/>
        <!-- Left side -->
        <line id="bSide3" x1="20" y1="140" x2="20" y2="140"
          stroke="var(--accent)" stroke-width="2"
          stroke-linecap="square" shape-rendering="crispEdges" opacity="0.55"/>
        <!-- Dot -->
        <circle id="boxDot" cx="20" cy="20" r="6" fill="var(--accent)"/>
        <!-- Dot glow (behind dot) -->
        <circle id="boxGlow" cx="20" cy="20" r="12" fill="var(--accent)" opacity="0.15"/>
      </svg>
    </div>
  </div>

  <div class="tool-bottom">
    <div class="phase-timer-row">
      <span class="phase-name" id="phaseName">Ready</span>
      <div class="timer-block">
        <span class="timer-num"  id="timerNum">—</span>
        <span class="timer-unit" id="timerUnit"></span>
      </div>
    </div>
    <div class="phase-instr" id="phaseInstr">session will begin shortly</div>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-val"   id="statDuration">0:00</span>
        <span class="stat-label">Duration</span>
      </div>
      <div class="stat">
        <span class="stat-val"   id="statCycles">0</span>
        <span class="stat-label">Cycles</span>
      </div>
      <div class="stat">
        <span class="stat-val"   id="statBreath">0s</span>
        <span class="stat-label">Breathwork</span>
      </div>
    </div>

    <div class="phase-guide" id="phaseGuide">
      <!-- filled by JS -->
    </div>

    <button class="btn-stop" id="btnStop"
      data-umami-event="NafasLega - Stop Session">Stop Session</button>
  </div>
</div>

<!-- Rainfall ambient -->
<audio id="sndAmbient" src="./416227__rasunter255__gentle-rainfall.mp3"
  preload="auto" loop></audio>

<script>
  /* ══════════════════════════════════════
     MODE DEFINITIONS
  ══════════════════════════════════════ */
  const MODES = {
    '478': {
      tagline: '4 · 7 · 8 Breathing Technique',
      desc: 'Activates your parasympathetic nervous system — calming your heart rate and cortisol in minutes.',
      pills: [
        { num: '4', label: 'Inhale' }, null,
        { num: '7', label: 'Hold'   }, null,
        { num: '8', label: 'Exhale' }
      ],
      phases: [
        { label: 'Inhale', instr: 'breathe in slowly',  dur: 4, ease: 'ease-in'  },
        { label: 'Hold',   instr: 'retain the breath',  dur: 7, ease: 'linear'   },
        { label: 'Exhale', instr: 'release completely', dur: 8, ease: 'ease-out' }
      ],
      breathPerCycle: 19
    },
    'box': {
      tagline: 'Box Breathing · 4 · 4 · 4 · 4',
      desc: 'Balances your nervous system — used by athletes and military for stress control and sharp focus.',
      pills: [
        { num: '4', label: 'Inhale' }, null,
        { num: '4', label: 'Hold'   }, null,
        { num: '4', label: 'Exhale' }, null,
        { num: '4', label: 'Hold'   }
      ],
      phases: [
        { label: 'Inhale', instr: 'breathe in slowly',  dur: 4, ease: 'linear' },
        { label: 'Hold',   instr: 'retain the breath',  dur: 4, ease: 'linear' },
        { label: 'Exhale', instr: 'release completely', dur: 4, ease: 'linear' },
        { label: 'Hold',   instr: 'empty lungs, hold',  dur: 4, ease: 'linear' }
      ],
      breathPerCycle: 16
    }
  };

  let currentMode = '478';

  /* ══════════════════════════════════════
     SPLASH RENDERING
  ══════════════════════════════════════ */
  function renderSplash(mode) {
    const m = MODES[mode];

    document.getElementById('splashTagline').textContent = m.tagline;
    document.getElementById('splashDesc').textContent    = m.desc;

    // Pills
    const pillsEl = document.getElementById('phasePills');
    pillsEl.innerHTML = m.pills.map(p =>
      p === null
        ? `<span class="pill-dot">·</span>`
        : `<div class="pill">
             <span class="pill-num">${p.num}</span>
             <span class="pill-label">${p.label}</span>
           </div>`
    ).join('');

    // Preview visual
    const isBox = mode === 'box';
    document.getElementById('splashOrbWrap').style.display = isBox ? 'none' : 'flex';
    document.getElementById('splashBoxWrap').classList.toggle('visible', isBox);

    // Mode buttons
    document.getElementById('mode478').classList.toggle('active', mode === '478');
    document.getElementById('modeBox').classList.toggle('active', mode === 'box');

    // Phase guide
    buildPhaseGuide(mode);
  }

  function buildPhaseGuide(mode) {
    const phases = MODES[mode].phases;
    const el = document.getElementById('phaseGuide');
    el.innerHTML = phases.map((p, i) =>
      `<div class="guide-item" id="g${i}">
         <div class="guide-phase-lbl">${p.label}</div>
         <div class="guide-dur-val">${p.dur}<small>s</small></div>
       </div>`
    ).join('');
  }

  function selectMode(mode) {
    currentMode = mode;
    renderSplash(mode);
  }

  renderSplash('478');

  /* ══════════════════════════════════════
     WEB AUDIO — CHIME GENERATOR
  ══════════════════════════════════════ */
  let audioCtx = null;
  let muted    = false;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playChime() {
    if (muted) return;
    const ctx = getCtx();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.connect(ctx.destination);
    [{ freq: 528, gain: 0.22 }, { freq: 1056, gain: 0.06 }].forEach(({ freq, gain }) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 2.2);
      osc.connect(g); g.connect(master);
      osc.start(now); osc.stop(now + 2.3);
    });
  }

  /* ══════════════════════════════════════
     AMBIENT
  ══════════════════════════════════════ */
  const sndAmbient = document.getElementById('sndAmbient');
  sndAmbient.volume = 0.28;

  function startAmbient() { if (muted) return; sndAmbient.currentTime = 0; sndAmbient.play().catch(() => {}); }
  function stopAmbient()  { sndAmbient.pause(); sndAmbient.currentTime = 0; }

  /* ══════════════════════════════════════
     MUTE
  ══════════════════════════════════════ */
  const btnMute = document.getElementById('btnMute');
  function setMuted(val) {
    muted = val;
    sndAmbient.muted = val;
    btnMute.textContent = muted ? '🔇' : '🔊';
    btnMute.classList.toggle('muted', muted);
  }
  btnMute.addEventListener('click', () => setMuted(!muted));

  /* ══════════════════════════════════════
     ORB (478) ANIMATION
  ══════════════════════════════════════ */
  const SCALE_BASE = 1, SCALE_PEAK = 1.85;
  const C = +(2 * Math.PI * 72).toFixed(2); // circumference for r=72

  const orbBall = document.getElementById('orbBall');
  const arcPath = document.getElementById('arcPath');

  function orbActivatePhase(p, idx) {
    const targetScale = (idx === 2) ? SCALE_BASE : SCALE_PEAK;
    orbBall.style.transition = `transform ${p.dur}s ${p.ease}, box-shadow ${p.dur}s ease`;
    orbBall.style.transform  = `scale(${targetScale})`;
    orbBall.style.boxShadow  = idx === 1
      ? '0 14px 56px rgba(45,106,79,0.32)'
      : idx === 0
        ? '0 10px 40px rgba(45,106,79,0.2)'
        : '0 4px 18px rgba(45,106,79,0.1)';

    arcPath.style.transition = 'none';
    arcPath.setAttribute('stroke-dashoffset', C);
    void arcPath.getBoundingClientRect();
    arcPath.style.transition = `stroke-dashoffset ${p.dur}s linear`;
    arcPath.setAttribute('stroke-dashoffset', '0');
  }

  function orbReset() {
    orbBall.style.transition = 'transform 0.7s ease, box-shadow 0.7s ease';
    orbBall.style.transform  = `scale(${SCALE_BASE})`;
    orbBall.style.boxShadow  = '0 6px 28px rgba(45,106,79,0.18)';
    arcPath.style.transition = 'none';
    arcPath.setAttribute('stroke-dashoffset', C);
  }

  /* ══════════════════════════════════════
     BOX ANIMATION
     Square corners (px in 160×160 SVG viewBox, margin=20):
       TL(20,20)  TR(140,20)  BR(140,140)  BL(20,140)
     Perimeter = 480px. Each side = 120px.
     Phase → side mapping (clockwise):
       0 Inhale  → top    TL→TR
       1 Hold    → right  TR→BR
       2 Exhale  → bottom BR→BL
       3 Hold    → left   BL→TL
  ══════════════════════════════════════ */
  const BOX_SIDES = [
    // { fixed axis, moving axis, from, to, isX_moving }
    { x1:20,  y1:20,  x2:140, y2:20,  moveX:true,  fromV:20,  toV:140 }, // top
    { x1:140, y1:20,  x2:140, y2:140, moveX:false, fromV:20,  toV:140 }, // right
    { x1:140, y1:140, x2:20,  y2:140, moveX:true,  fromV:140, toV:20  }, // bottom
    { x1:20,  y1:140, x2:20,  y2:20,  moveX:false, fromV:140, toV:20  }, // left
  ];

  let boxRafId     = null;
  let boxPhaseStart = null;
  let boxPhaseIdx   = 0;
  let boxPhaseDur   = 4;

  function boxStartPhase(idx, dur) {
    if (boxRafId) cancelAnimationFrame(boxRafId);
    boxPhaseIdx   = idx;
    boxPhaseDur   = dur;
    boxPhaseStart = performance.now();

    // Draw completed sides (full bright trail for sides before this one)
    for (let i = 0; i < 4; i++) {
      const s = BOX_SIDES[i];
      const el = document.getElementById('bSide' + i);
      if (i < idx) {
        // fully drawn
        el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
        el.setAttribute('x2', s.x2); el.setAttribute('y2', s.y2);
      } else {
        // not started yet — collapse to start point
        el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
        el.setAttribute('x2', s.x1); el.setAttribute('y2', s.y1);
      }
    }

    boxRafFrame(performance.now());
  }

  function boxRafFrame(now) {
    if (!running) return;
    const elapsed = (now - boxPhaseStart) / 1000;
    const frac    = Math.min(elapsed / boxPhaseDur, 1);
    const s       = BOX_SIDES[boxPhaseIdx];

    // Interpolate the active side
    const v   = s.fromV + (s.toV - s.fromV) * frac;
    const el  = document.getElementById('bSide' + boxPhaseIdx);
    el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
    if (s.moveX) {
      el.setAttribute('x2', v);   el.setAttribute('y2', s.y2);
    } else {
      el.setAttribute('x2', s.x2); el.setAttribute('y2', v);
    }

    // Dot position = tip of current side
    const dot  = document.getElementById('boxDot');
    const glow = document.getElementById('boxGlow');
    const dx = s.moveX ? v   : s.x2;
    const dy = s.moveX ? s.y2 : v;
    dot.setAttribute('cx', dx);  dot.setAttribute('cy', dy);
    glow.setAttribute('cx', dx); glow.setAttribute('cy', dy);

    if (frac < 1) {
      boxRafId = requestAnimationFrame(boxRafFrame);
    }
  }

  function boxReset() {
    if (boxRafId) { cancelAnimationFrame(boxRafId); boxRafId = null; }
    for (let i = 0; i < 4; i++) {
      const s = BOX_SIDES[i];
      const el = document.getElementById('bSide' + i);
      el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
      el.setAttribute('x2', s.x1); el.setAttribute('y2', s.y1);
    }
    const dot  = document.getElementById('boxDot');
    const glow = document.getElementById('boxGlow');
    dot.setAttribute('cx', 20);  dot.setAttribute('cy', 20);
    glow.setAttribute('cx', 20); glow.setAttribute('cy', 20);
  }

  /* ══════════════════════════════════════
     SESSION CORE
  ══════════════════════════════════════ */
  let raf, phaseStart, sessionInterval;
  let phaseIdx = 0, cycles = 0, sessionSec = 0, running = false;

  const splash       = document.getElementById('splash');
  const tool         = document.getElementById('tool');
  const btnBegin     = document.getElementById('btnBegin');
  const btnExit      = document.getElementById('btnExit');
  const btnStop      = document.getElementById('btnStop');
  const phaseName    = document.getElementById('phaseName');
  const phaseInstr   = document.getElementById('phaseInstr');
  const timerNum     = document.getElementById('timerNum');
  const timerUnit    = document.getElementById('timerUnit');
  const statDuration = document.getElementById('statDuration');
  const statCycles   = document.getElementById('statCycles');
  const statBreath   = document.getElementById('statBreath');

  function fmt(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function activatePhase(idx) {
    phaseIdx = idx;
    const mode   = MODES[currentMode];
    const p      = mode.phases[idx];
    const total  = mode.phases.length;

    phaseName.textContent  = p.label;
    phaseInstr.textContent = p.instr;

    // Guide highlight
    for (let i = 0; i < total; i++) {
      const g = document.getElementById('g' + i);
      if (g) g.classList.toggle('active', i === idx);
    }

    // Visual
    if (currentMode === '478') {
      orbActivatePhase(p, idx);
    } else {
      boxStartPhase(idx, p.dur);
    }

    playChime();
  }

  function tick(now) {
    if (!running) return;
    const elapsed   = (now - phaseStart) / 1000;
    const p         = MODES[currentMode].phases[phaseIdx];
    const remaining = Math.ceil(p.dur - elapsed);
    timerNum.textContent  = remaining > 0 ? remaining : 1;
    timerUnit.textContent = 'sec';

    if (elapsed >= p.dur) {
      phaseStart = now;
      const total = MODES[currentMode].phases.length;
      const next  = (phaseIdx + 1) % total;
      if (next === 0) {
        cycles++;
        statCycles.textContent = cycles;
        statBreath.textContent = (cycles * MODES[currentMode].breathPerCycle) + 's';
      }
      activatePhase(next);
    }
    raf = requestAnimationFrame(tick);
  }

  function startSession() {
    running = true;
    phaseIdx = 0; cycles = 0; sessionSec = 0;
    statCycles.textContent   = '0';
    statBreath.textContent   = '0s';
    statDuration.textContent = '0:00';

    // Show correct visualiser
    const isBox = currentMode === 'box';
    document.getElementById('orbWrap').style.display = isBox ? 'none' : 'flex';
    document.getElementById('boxWrap').classList.toggle('visible', isBox);

    if (currentMode === '478') {
      orbBall.style.transition = 'none';
      orbBall.style.transform  = `scale(${SCALE_BASE})`;
      orbBall.style.boxShadow  = '0 6px 28px rgba(45,106,79,0.18)';
      void orbBall.getBoundingClientRect();
    } else {
      boxReset();
    }

    startAmbient();
    phaseStart = performance.now();
    activatePhase(0);
    raf = requestAnimationFrame(tick);

    sessionInterval = setInterval(() => {
      sessionSec++;
      statDuration.textContent = fmt(sessionSec);
    }, 1000);
  }

  function stopSession() {
    running = false;
    cancelAnimationFrame(raf);
    clearInterval(sessionInterval);
    stopAmbient();

    if (currentMode === '478') {
      orbReset();
    } else {
      boxReset();
    }

    phaseName.textContent  = 'Ready';
    phaseInstr.textContent = 'session will begin shortly';
    timerNum.textContent   = '—';
    timerUnit.textContent  = '';

    const total = MODES[currentMode].phases.length;
    for (let i = 0; i < total; i++) {
      const g = document.getElementById('g' + i);
      if (g) g.classList.remove('active');
    }
  }

  function goToTool() {
    splash.classList.add('hidden');
    tool.classList.remove('hidden');
    startSession();
  }

  function goToSplash() {
    stopSession();
    tool.classList.add('hidden');
    splash.classList.remove('hidden');
  }

  btnBegin.addEventListener('click', goToTool);
  btnExit.addEventListener('click',  goToSplash);
  btnStop.addEventListener('click',  goToSplash);
</script>
</body>
</html>
